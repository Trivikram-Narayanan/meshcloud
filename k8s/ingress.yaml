apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meshcloud-ingress
  labels:
    app: meshcloud
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - meshcloud.example.com
    - api.meshcloud.example.com
    secretName: meshcloud-tls
  rules:
  - host: meshcloud.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meshcloud
            port:
              number: 80
  - host: api.meshcloud.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meshcloud
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meshcloud-docs
  labels:
    app: meshcloud
    component: docs
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - docs.meshcloud.example.com
    secretName: meshcloud-docs-tls
  rules:
  - host: docs.meshcloud.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meshcloud-docs
            port:
              number: 80