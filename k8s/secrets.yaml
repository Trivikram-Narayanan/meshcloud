apiVersion: v1
kind: Secret
metadata:
  name: meshcloud-secrets
  labels:
    app: meshcloud
type: Opaque
data:
  # Base64 encoded values - replace with your actual secrets
  # echo -n "your-super-secret-jwt-key" | base64
  jwt-secret: eW91ci1zdXBlci1zZWNyZXQtand0LWtleQ==
  # echo -n "meshcloud_secret_token" | base64
  node-token: bWVzaGNsb3VkX3NlY3JldF90b2tlbg==
  # echo -n "postgresql://meshcloud:password@postgres:5432/meshcloud" | base64
  database-url: cG9zdGdyZXNxbDovL21lc2hjbG91ZDpwYXNzd29yZEBwb3N0Z3JlczoxMjM0L21lc2hjbG91ZA==

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meshcloud-config
  labels:
    app: meshcloud
data:
  NODE_URL: "https://meshcloud.example.com"
  LOG_LEVEL: "INFO"
  MAX_FILE_SIZE: "104857600"  # 100MB
  CHUNK_SIZE: "4194304"       # 4MB
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"     # 1 minute
  HEALTH_CHECK_INTERVAL: "30"
  METRICS_ENABLED: "true"
  PROMETHEUS_METRICS_ENABLED: "true"