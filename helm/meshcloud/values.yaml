# Default values for meshcloud.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# MeshCloud application configuration
meshcloud:
  image:
    repository: meshcloud/meshcloud
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 3

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000

  securityContext: {}

  service:
    type: ClusterIP
    port: 80
    targetPort: 8000

  ingress:
    enabled: false
    className: ""
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    hosts:
      - host: meshcloud.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

  # Application configuration
  config:
    nodeUrl: "https://meshcloud.local"
    logLevel: "INFO"
    maxFileSize: "104857600"  # 100MB
    chunkSize: "4194304"      # 4MB
    rateLimitRequests: "100"
    rateLimitWindow: "60"
    healthCheckInterval: "30"
    metricsEnabled: "true"
    prometheusMetricsEnabled: "true"

  # Secrets - override these with your own values
  secrets:
    jwtSecret: "your-super-secret-jwt-key-change-in-production"
    nodeToken: "meshcloud_secret_token"
    databaseUrl: "sqlite:///app/db/meshcloud.db"

# Storage configuration
storage:
  enabled: true
  size: 100Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Database configuration
postgresql:
  enabled: false
  auth:
    postgresPassword: "changeme"
    username: "meshcloud"
    password: "changeme"
    database: "meshcloud"
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 50Gi

# Redis configuration (optional)
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi

# Prometheus monitoring
prometheus:
  enabled: false
  server:
    persistentVolume:
      enabled: true
      size: 50Gi
    retention: "200h"

# Grafana dashboards
grafana:
  enabled: false
  adminPassword: "admin"
  persistence:
    enabled: true
    size: 10Gi

# External services
externalServices:
  # If using external PostgreSQL
  postgresql:
    host: ""
    port: 5432
    database: ""
    username: ""
    password: ""

  # If using external Redis
  redis:
    host: ""
    port: 6379
    password: ""

  # If using external Prometheus
  prometheus:
    url: ""